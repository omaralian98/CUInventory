services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  sql:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLPASSWORD}"
    expose:
      - "1433"
    volumes:
      - type: "volume"
        target: "/var/opt/mssql"
        source: "cuinventory.apphost-c0151136f8-sql-data"
        read_only: false
    networks:
      - "aspire"
    restart: "unless-stopped"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b"
      interval: "5s"
      timeout: "10s"
      retries: 20
      start_period: "30s"
  cloudbeaver:
    image: "${CLOUDBEAVER_IMAGE}"
    environment:
      CB_SERVER_NAME: "CUInventory CloudBeaver"
      CB_ADMIN_NAME: "cbadmin"
      CB_ADMIN_PASSWORD: "${CLOUDBEAVERADMINPASSWORD}"
      CLOUDBEAVER_APP_GRANT_CONNECTIONS_ACCESS_TO_ANONYMOUS_TEAM: "true"
    ports:
      - "8978:8978"
    volumes:
      - type: "volume"
        target: "/opt/cloudbeaver/workspace"
        source: "cloudbeaver-workspace"
        read_only: false
    depends_on:
      sql:
        condition: "service_healthy"
    networks:
      - "aspire"
    restart: "unless-stopped"
  migrator:
    image: "${MIGRATOR_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ConnectionStrings__Default: "Server=sql,1433;User ID=sa;Password=${SQLPASSWORD};TrustServerCertificate=true;Initial Catalog=CUInventory"
      DEFAULT_HOST: "sql"
      DEFAULT_PORT: "1433"
      DEFAULT_USERNAME: "sa"
      DEFAULT_PASSWORD: "${SQLPASSWORD}"
      DEFAULT_URI: "mssql://sa:${SQLPASSWORD}@sql:1433/CUInventory"
      DEFAULT_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=CUInventory;trustServerCertificate=true"
      DEFAULT_DATABASENAME: "CUInventory"
      OpenIddict__Applications__CUInventory_App__RootUrl: "http://localhost:4200"
      OpenIddict__Applications__CUInventory_Swagger__RootUrl: "http://localhost:8080/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "Migrator"
    depends_on:
      sql:
        condition: "service_healthy"
    networks:
      - "aspire"
  backend:
    image: "${BACKEND_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__Default: "Server=sql,1433;User ID=sa;Password=${SQLPASSWORD};TrustServerCertificate=true;Initial Catalog=CUInventory"
      DEFAULT_HOST: "sql"
      DEFAULT_PORT: "1433"
      DEFAULT_USERNAME: "sa"
      DEFAULT_PASSWORD: "${SQLPASSWORD}"
      DEFAULT_URI: "mssql://sa:${SQLPASSWORD}@sql:1433/CUInventory"
      DEFAULT_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=CUInventory;trustServerCertificate=true"
      DEFAULT_DATABASENAME: "CUInventory"
      App__SelfUrl: "http://localhost:8080"
      App__AngularUrl: "http://localhost:4200"
      App__CorsOrigins: "http://localhost:4200"
      App__RedirectAllowedUrls: "http://localhost:4200"
      AuthServer__Authority: "http://localhost:8080"
      AuthServer__RequireHttpsMetadata: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "Backend"
    ports:
      - "8080:8080"
    depends_on:
      sql:
        condition: "service_healthy"
      migrator:
        condition: "service_completed_successfully"
    networks:
      - "aspire"
    restart: "unless-stopped"
  frontend:
    image: "${FRONTEND_IMAGE}"
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "unless-stopped"
networks:
  aspire:
    driver: "bridge"
volumes:
  cuinventory.apphost-c0151136f8-sql-data:
    driver: "local"
  cloudbeaver-workspace:
    driver: "local"
