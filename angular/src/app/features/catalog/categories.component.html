<cu-page-shell title="Categories" subtitle="Product categories used for grouping and reporting">
  <ng-container slot="actions">
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="onToggleInactive()">
      <i class="fas" [class.fa-eye]="!includeInactive" [class.fa-eye-slash]="includeInactive"></i>
      {{ includeInactive ? 'Hide inactive' : 'Show inactive' }}
    </button>
    <button type="button" class="btn btn-sm btn-primary" *abpPermission="'CUInventory.Categories.Create'" (click)="create()">
      <i class="fas fa-plus"></i> New category
    </button>
  </ng-container>

  <cu-data-table
    [columns]="columns"
    [rows]="rows()"
    [count]="count()"
    [list]="list"
    [actions]="actions"
    [loading]="loading()"
    [showSearch]="true"
    searchPlaceholder="Search categories…"
    (searchChange)="onSearch($event)"
    (action)="onAction($event)">
    <ng-template cuCol="status" let-row>
      <cu-status-badge kind="active" [value]="row.isActive ? 1 : 0" />
    </ng-template>
  </cu-data-table>
</cu-page-shell>

<cu-modal
  [open]="modalOpen()"
  [title]="editing() ? 'Edit category' : 'New category'"
  [busy]="saving()"
  (closed)="modalOpen.set(false)">
  <form [formGroup]="form">
    <cu-form-field [formGroup]="form" controlName="name" label="Name" [required]="true" />
    <cu-form-field [formGroup]="form" controlName="orderIndex" label="Order" type="number" />
    <cu-form-field [formGroup]="form" controlName="isActive" label="Active" type="checkbox" />
  </form>
  <ng-container slot="footer">
    <button type="button" class="btn btn-outline-secondary" [disabled]="saving()" (click)="modalOpen.set(false)">Cancel</button>
    <button type="button" class="btn btn-primary" [disabled]="saving()" (click)="save()">
      @if (saving()) { <i class="fas fa-circle-notch fa-spin"></i> } Save
    </button>
  </ng-container>
</cu-modal>
