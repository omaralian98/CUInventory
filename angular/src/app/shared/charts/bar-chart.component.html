@if (rows().length === 0) {
  <p class="cu-chart-empty cu-muted">{{ emptyText | abpLocalization }}</p>
} @else {
  <div class="cu-bars" role="list">
    @for (row of rows(); track row.label) {
      <div class="cu-bar-row" role="listitem" [title]="row.label + ': ' + format(row.value) + ' ' + (unit | abpLocalization)">
        <span class="cu-bar-label" [title]="row.label">{{ row.label }}</span>
        <div class="cu-bar-track">
          <div class="cu-bar-fill" [style.width.%]="row.pct"></div>
        </div>
        <span class="cu-bar-value cu-mono">{{ format(row.value) }}</span>
      </div>
    }
  </div>
}
